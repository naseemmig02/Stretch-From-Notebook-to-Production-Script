name: integration-5b-model-comparison Autograder

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  autograder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run autograder tests
        run: |
          pytest tests/ -v --tb=short
